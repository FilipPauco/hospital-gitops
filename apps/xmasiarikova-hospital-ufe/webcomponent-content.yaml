apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: xmasiarikova-hospital-ufe-content
spec:
  microFrontend: xpaucof-hospital-ufe
  element: xmasiarikova-bed-app
  attributes:
    - name: api-base
      value: /xmasiarikova-hospital-api
    - name: ward-id
      value: bobulova-ward
    - name: base-path
      value: /xmasiarikova-hospital-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?xmasiarikova-hospital-wl(/.*)?$"
