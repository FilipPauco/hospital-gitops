apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpaucof-hospital-webapi
spec:
  template:
    spec:
      containers:
        - name: openapi-ui
          env:
            - name: URL
              value: /xpaucof-hospital-openapi
            - name: BASE_URL
              value: /xpaucof-hospital-openapi-ui
